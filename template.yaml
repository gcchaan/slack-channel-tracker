AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  slack-channel-tracker

Parameters:
  SlackTokenSsmPath:
    Type: String
    Default: "slack-channel-tracker/slack-bot-user-oauth-token"
    Description: "SSM Parameter Store path for Slack `Bot User Oauth Token`. This value should not start with a forward slash (/)."
  SlackSigningSecretSsmPath:
      Type: String
      Description: "SSM Parameter Store path for Slack Signing Secret. This value should not start with a forward slash (/)."
      Default: "slack-channel-tracker/signing_secret"
  SlackChannelId:
    Type: String
    Description: "ID of the Slack channel to post messages to. You can find the channel ID by opening the channel in Slack and looking at the URL. It will be in the format `https://app.slack.com/client/T12345678/C1234567890` where `C1234567890` is the channel ID."

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 10
    MemorySize: 128

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  SlackChannelTrackerFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Metadata:
      BuildMethod: go1.x
    Properties:
      CodeUri: app/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
      - arm64
      Environment:
        Variables:
          SLACK_TOKEN_SSM_PATH: !Sub "/${SlackTokenSsmPath}"
          SLACK_SIGNING_SECRET_SSM_PATH: !Sub "/${SlackSigningSecretSsmPath}"
          SLACK_CHANNEL_ID: !Ref SlackChannelId
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: !Ref SlackTokenSsmPath
        - SSMParameterReadPolicy:
            ParameterName: !Ref SlackSigningSecretSsmPath
      FunctionUrlConfig:
        AuthType: NONE
  SlackChannelTrackerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SlackChannelTrackerFunction}"
      RetentionInDays: 7

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  SlackChannelTrackerFunction:
    Description: SlackChannelTracker Lambda Function ARN
    Value: !GetAtt SlackChannelTrackerFunction.Arn
  SlackChannelTrackerFunctionIamRole:
    Description: Implicit IAM Role created for SlackChannelTracker function
    Value: !GetAtt SlackChannelTrackerFunctionRole.Arn
  SlackChannelTrackerFunctionUrl:
    Description: "Webhook URL to be configured in the Slack Event Subscriptions page"
    Value: !GetAtt SlackChannelTrackerFunctionUrl.FunctionUrl
